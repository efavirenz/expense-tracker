<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Expense Tracker</title>

<!-- PWA / iOS home screen setup -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2F6F5E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expenses">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<header class="app-header">
  <button id="backBtn" class="back-btn" aria-label="Back" hidden>&#8592;</button>
  <h1 id="pageTitle">Expenses</h1>
  <button id="searchBtn" class="search-btn" aria-label="Search" >🔍</button>
</header>

<main id="app" class="app-main"></main>

<div id="modalRoot"></div>

<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(function(){});
    });
  }
</script>
</body>
</html>
